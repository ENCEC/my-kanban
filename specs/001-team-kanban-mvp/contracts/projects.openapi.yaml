openapi: 3.1.0
info:
  title: Projects API
  version: 1.0.0
  description: 团队 Kanban MVP 的项目接口契约
servers:
  - url: http://localhost:3001
tags:
  - name: projects
paths:
  /api/projects:
    get:
      tags: [projects]
      summary: 获取项目列表
      operationId: listProjects
      responses:
        '200':
          description: 成功返回项目列表
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectSummary'
    post:
      tags: [projects]
      summary: 创建项目
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 项目创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '409':
          description: 项目名称重复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/projects/{projectId}:
    get:
      tags: [projects]
      summary: 获取单个项目及其看板基础信息
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 成功返回项目详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          description: 项目不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ProjectSummary:
      type: object
      required: [id, name, taskCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        taskCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProjectDetail:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
